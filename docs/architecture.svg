<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 700" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif">
  <rect width="1000" height="700" fill="#ffffff"/>

  <!-- Title -->
  <text x="500" y="38" text-anchor="middle" font-size="22" font-weight="600" fill="#1a1a1a">Financial OS Architecture</text>
  <text x="500" y="60" text-anchor="middle" font-size="13" fill="#666">Two specialist agents sharing the same long-term memory</text>

  <!-- ============ ADVISORY LAYER ============ -->
  <rect x="60" y="90" width="880" height="180" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5" rx="8"/>
  <text x="80" y="115" font-size="13" font-weight="600" fill="#666" letter-spacing="0.5">ADVISORY LAYER</text>

  <!-- Wealth Manager -->
  <rect x="100" y="135" width="380" height="120" fill="#ffffff" stroke="#2563eb" stroke-width="2" rx="6"/>
  <text x="120" y="162" font-size="15" font-weight="600" fill="#2563eb">Wealth Manager</text>
  <text x="120" y="180" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#888">scripts/daily-briefing.ts</text>
  <text x="120" y="206" font-size="12" fill="#333">• Weekly briefing on rule triggers</text>
  <text x="120" y="224" font-size="12" fill="#333">• Allocation drift detection</text>
  <text x="120" y="242" font-size="12" fill="#333">• Options expiration alerts</text>

  <!-- CPA -->
  <rect x="520" y="135" width="380" height="120" fill="#ffffff" stroke="#059669" stroke-width="2" rx="6"/>
  <text x="540" y="162" font-size="15" font-weight="600" fill="#059669">CPA</text>
  <text x="540" y="180" font-size="11" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" fill="#888">scripts/tax-audit.ts</text>
  <text x="540" y="206" font-size="12" fill="#333">• Unclaimed credit recovery (AMT)</text>
  <text x="540" y="224" font-size="12" fill="#333">• Statute-of-limitations tracking</text>
  <text x="540" y="242" font-size="12" fill="#333">• TLH and gain/loss pairing</text>

  <!-- Down arrows from agents to context -->
  <path d="M 290 270 L 290 305" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 710 270 L 710 305" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- ============ CONTEXT LAYER ============ -->
  <rect x="60" y="310" width="880" height="160" fill="#fef3c7" stroke="#d97706" stroke-width="1.5" rx="8"/>
  <text x="80" y="335" font-size="13" font-weight="600" fill="#92400e" letter-spacing="0.5">CONTEXT LAYER (shared by both agents)</text>
  <text x="80" y="354" font-size="11" fill="#92400e" font-style="italic">Both agents read all four files. Both write back to DECISIONS.md.</text>

  <rect x="100" y="375" width="200" height="78" fill="#ffffff" stroke="#d97706" stroke-width="1" rx="4"/>
  <text x="200" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">FINANCIAL_OVERVIEW</text>
  <text x="200" y="420" text-anchor="middle" font-size="11" fill="#666">Positions · cost basis</text>
  <text x="200" y="436" text-anchor="middle" font-size="11" fill="#666">Allocation · options</text>

  <rect x="320" y="375" width="200" height="78" fill="#ffffff" stroke="#d97706" stroke-width="1" rx="4"/>
  <text x="420" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">GOALS_AND_RULES</text>
  <text x="420" y="420" text-anchor="middle" font-size="11" fill="#666">10 mechanical rules</text>
  <text x="420" y="436" text-anchor="middle" font-size="11" fill="#666">Allocation targets</text>

  <rect x="540" y="375" width="200" height="78" fill="#ffffff" stroke="#d97706" stroke-width="1" rx="4"/>
  <text x="640" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">TAX_CONTEXT</text>
  <text x="640" y="420" text-anchor="middle" font-size="11" fill="#666">Carryforwards · AMT</text>
  <text x="640" y="436" text-anchor="middle" font-size="11" fill="#666">Roth window · state</text>

  <rect x="760" y="375" width="160" height="78" fill="#ffffff" stroke="#d97706" stroke-width="1.5" rx="4" stroke-dasharray="4,3"/>
  <text x="840" y="400" text-anchor="middle" font-size="12" font-weight="600" fill="#1a1a1a">DECISIONS</text>
  <text x="840" y="420" text-anchor="middle" font-size="11" fill="#666">Journal (read +</text>
  <text x="840" y="436" text-anchor="middle" font-size="11" fill="#666">write by both)</text>

  <!-- Down arrows from data to context -->
  <path d="M 200 515 L 200 478" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arrow-up)"/>
  <path d="M 500 515 L 500 478" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arrow-up)"/>
  <path d="M 770 515 L 770 478" stroke="#999" stroke-width="1.5" fill="none" marker-end="url(#arrow-up)"/>

  <!-- ============ DATA LAYER ============ -->
  <rect x="60" y="520" width="880" height="160" fill="#f5f5f7" stroke="#d1d1d6" stroke-width="1.5" rx="8"/>
  <text x="80" y="545" font-size="13" font-weight="600" fill="#666" letter-spacing="0.5">DATA LAYER</text>

  <rect x="100" y="565" width="240" height="100" fill="#ffffff" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="220" y="590" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Monarch Money MCP</text>
  <text x="220" y="612" text-anchor="middle" font-size="11" fill="#666">Schwab · Wealthfront</text>
  <text x="220" y="628" text-anchor="middle" font-size="11" fill="#666">Coinbase · BofA</text>
  <text x="220" y="650" text-anchor="middle" font-size="11" fill="#666">Positions + cost basis</text>

  <rect x="380" y="565" width="240" height="100" fill="#ffffff" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="500" y="590" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Aiwyn Tax MCP</text>
  <text x="500" y="612" text-anchor="middle" font-size="11" fill="#666">Historical transcripts</text>
  <text x="500" y="628" text-anchor="middle" font-size="11" fill="#666">Prior-year returns</text>
  <text x="500" y="650" text-anchor="middle" font-size="11" fill="#666">Carryforward verification</text>

  <rect x="660" y="565" width="240" height="100" fill="#ffffff" stroke="#999" stroke-width="1.5" rx="6"/>
  <text x="780" y="590" text-anchor="middle" font-size="13" font-weight="600" fill="#1a1a1a">Yahoo Finance</text>
  <text x="780" y="612" text-anchor="middle" font-size="11" fill="#666">S&amp;P 500 quotes</text>
  <text x="780" y="628" text-anchor="middle" font-size="11" fill="#666">52-week high</text>
  <text x="780" y="650" text-anchor="middle" font-size="11" fill="#666">Daily change</text>

  <!-- Arrow definitions -->
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
    <marker id="arrow-up" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#999"/>
    </marker>
  </defs>
</svg>
